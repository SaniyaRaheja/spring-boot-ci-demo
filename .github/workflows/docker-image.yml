name: Docker Build -> Push -> Deploy

on:
  push:
    branches: [ "main" ]
 

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: setup jdk
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '21'

    - name: Building jar
      run: mvn clean package -DskipTests
      working-directory: ./helloApp

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}


    - name: Building docker image
      run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/spring-boot-ci-demo:latest .
      working-directory: ./helloApp

    - name: Pushing image to dockerhub
      run: docker push ${{secrets.DOCKERHUB_USERNAME}}/spring-boot-ci-demo:latest

    - name: ssh & deploy to ec2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST}}
        username: ${{ secrets.EC2_USER}}
        key: ${{secrets.EC2_SSH_KEY}}
        script: |
          docker stop spring-demo || true
          docker rm spring-demo || true
          docker stop $(docker ps -q --filter "publish=8080") || true
          docker rm $(docker ps -aq --filter "publish=8080") || true
          docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
          docker run -d --name spring-demo -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
